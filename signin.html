<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup-page</title>
    <link rel="stylesheet" href="signup.css">
</head>

<body>
    <nav>
        <div class="top">
            <p>SKILLSWAP</p>
            <div class="link">
                <button><a href="getstart.html">Signup</a></button>
                <button><a href="signin.html"> Signin</a></button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="left">
            <h1>SKILLSWAP</h1>
            <p>Teach, Learn and Grow</p>
        </div>

        <div class="right">
            <h2>Welcome Back!</h2>
            <label>Email</label>
            <input id="signinEmail" class="input" type="email" placeholder="Enter your email">
            <label>Password</label>
            <div class="password">
                <input id="signinPassword" class="input" type="password" placeholder="Enter password">
            </div>
            <button id="signinBtn">Sign In</button>
            <div class="or">or continue with</div>
            <div class="google">
                <img src="images/250px-Google_Favicon_2025.svg (1).png" alt="">
            </div>
            <p class="login-link">Don't have an account? <a href="Signup.html">Sign Up</a></p>
        </div>
    </div>
    <script src="signin.js"></script>
</body>

</html>
