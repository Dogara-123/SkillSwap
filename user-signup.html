<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> User Signup-page</title>
    <link rel="stylesheet" href="user-signup.css">
</head>
<body>
    <nav>
        <div class="top">
            <p>SKILLSWAP</p>
            <div class="link">
                <button><a href="getstart.html">Signup</a></button>
                <button><a href="signin.html"> Signin</a></button>
            </div>
        </div>
    </nav>

<div class="container">
    <div class="left">
        <h1>SKILLSWAP</h1>
        <p>Teach, Learn and Grow</p>
    </div>

    <div class="right">
        <h2>Create User Account</h2>
        <p>Connect and Learn</p>
        <label>Full Name</label>
        <input id="fullname" class="input" type="text" placeholder="Enter your name">
        <label>Email</label>
        <input id="email" class="input" type="email" placeholder="Enter your email">
        <label>Password</label>
        <div class="password">
            <input id="password" class="input" type="password" placeholder="Enter password">
        </div>
        <label>Confirm Password</label>
        <div class="password">
            <input id="confirmPassword" class="input" type="password" placeholder="Confirm password">
        </div>

        <div class="check">
            <input id="agree" type="checkbox">I agree with Privacy and Policy
        </div>
        <button id="signupBtn">Sign Up</button>
        <div class="or">or continue with</div>
        <div class="google">
            <img src="images/250px-Google_Favicon_2025.svg (1).png" alt="">
        </div>
        <p class="login-link">Already have an account? <a href="signin.html">Login</a></p>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="signup.js"></script>
</body>
</html>
